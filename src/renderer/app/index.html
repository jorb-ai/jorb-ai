<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    CSP: connect-src 'self' enforces the Phase-4 dumb-terminal invariant —
    the renderer cannot reach any server except its own. All data goes
    through the main-process WebSocket. No external font/stylesheet/image
    hosts. The desktop app uses the host OS's system font stack,
    mirroring finbro.me.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'">
  <title>jorb.ai</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
